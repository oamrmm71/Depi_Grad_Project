name: massar
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.3
  google_fonts: ^6.3.1
  flutter_card_swiper: ^7.0.2
  dio: ^5.9.2
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.1
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.6
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - lib/assets/
    - .env
flutter_native_splash:
  color: "#F8F8F3"

  android: true
  ios: true

  android_12:
    image: lib/assets/icon_logo.png
    color: "#F8F8F3"
    icon_background_color: "#F8F8F3"

flutter_icons:
  android: true
  ios: true
  image_path: "lib/assets/icon_logo.png"